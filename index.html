<h1>An explicit formula of MZVs in terms of symmetric MZVs</h1>
<div class="precompute"><script type="text/x-sage">



import sympy as sp
import itertools
from functools import reduce
from operator import mul

import sympy as sp
from functools import lru_cache
from math import factorial

# ======================
# 基本記号
# ======================
x, y = "x", "y"


# ======================
# 線形結合（dict版）
# ======================
def lc_add(A, B):
    C = {}

    for k, v in A.items():
        C[k] = C.get(k, 0) + v

    for k, v in B.items():
        C[k] = C.get(k, 0) + v

    return {k: v for k, v in C.items() if v != 0}


def lc_scale(c, A):
    return {k: c * v for k, v in A.items()}


# ======================
# index ⇄ word
# ======================
def index_to_word1(n):
    return (x,) * (n - 1) + (y,)


def index_to_word(alpha):
    w = ()
    for n in alpha:
        w += index_to_word1(n)
    return w


def word_to_index(w):
    cnt = 0
    idx = []

    for s in w:
        if s == x:
            cnt += 1
        elif s == y:
            idx.append(cnt + 1)
            cnt = 0
        else:
            return None

    if cnt > 0:
        return None

    return tuple(idx)


# ======================
# shuffle（word版）
# ======================
@lru_cache(None)
def shuffle_word(v, w):
    if not v:
        return {w: 1}
    if not w:
        return {v: 1}

    t1 = {}
    for ww, c in shuffle_word(v[1:], w).items():
        t1[(v[0],) + ww] = c

    t2 = {}
    for ww, c in shuffle_word(v, w[1:]).items():
        t2[(w[0],) + ww] = c

    return lc_add(t1, t2)


# ======================
# shuffle（index版）
# ======================
def qshuffle(a, b):
    v = index_to_word(a[::-1])
    w = index_to_word(b[::-1])

    sw = shuffle_word(v, w)

    out = {}
    for word, c in sw.items():
        idx = word_to_index(word)
        if idx is not None:
            out[idx[::-1]] = c

    return out


# ======================
# trailing 1 操作
# ======================
def trailing_ones_len(k):
    t = 0
    for a in reversed(k):
        if a == 1:
            t += 1
        else:
            break
    return t


def pick_key(A):
    for k in A:
        if k and k[-1] == 1:
            return k
    return None


def has_trailing_one(A):
    return any(k and k[-1] == 1 for k in A)


# ======================
# 1ステップ消去
# ======================
def eliminate_one_step(A):
    k = pick_key(A)
    if k is None:
        return A

    coeff = A[k]
    t = trailing_ones_len(k)

    prefix = k[:-t]
    ones = (1,) * t

    A2 = lc_add(A, lc_scale(-coeff, qshuffle(prefix, ones)))

    return A2


# ======================
# 全消去
# ======================
def eliminate_all(A):
    cur = dict(A)

    while has_trailing_one(cur):
        cur = eliminate_one_step(cur)

    return cur


# ======================
# RegShuffle（定数項のみ）
# ======================
import sympy as sp

Z = sp.Function("Z")
ZS = sp.Function("ZS")

def mzv_add(A, B):
    C = {}
    for k, v in A.items():
        C[k] = C.get(k, 0) + v
    for k, v in B.items():
        C[k] = C.get(k, 0) + v
    return {k: v for k, v in C.items() if v != 0}

def mzv_scale(c, A):
    return {k: c*v for k, v in A.items()}

def index_to_Z(A):
    return {tuple(k): v for k, v in A.items()}

def format_mzv(A):
    terms = []
    for k, v in A.items():
        if v == 1:
            terms.append(f"Z{tuple(k)}")
        else:
            terms.append(f"{v}*Z{tuple(k)}")
    return " + ".join(terms) if terms else "0"

# --- ここから追加 ---
def is_Z(expr):
    return expr.func == Z

def is_ZS(expr):
    return expr.func == ZS

def Z_to_dict(expr):
    return {tuple(expr.args): 1}

def RegShuffle(expr):

    # --- dict ---
    if isinstance(expr, dict):
        return sp.expand(format_mzv(eliminate_all(expr)))

    # --- 数 ---
    if expr.is_Number:
        return expr

    # --- ZSはそのまま ---
    if is_ZS(expr):
        return expr

    # --- ★ ここが本質：Zを計算する ---
    if is_Z(expr):
        d = Z_to_dict(expr)
        return RegShuffle(d)

    # --- 加法 ---
    if expr.is_Add:
        return sp.Add(*[RegShuffle(a) for a in expr.args])

    # --- 乗法 ---
    if expr.is_Mul:
        return sp.Mul(*[RegShuffle(a) for a in expr.args])

    return expr
# --- ここまで ---


# -----------------------
# 基本関数
# -----------------------

def pow_func(x, n):
    return 1 if n == 0 else x**n

def compositions(k, r):
    return [t for t in itertools.product(range(k+1), repeat=r) if sum(t) == k]

Z  = sp.Function("Z")
ZS = sp.Function("ZS")
ZF  = sp.Function("ZF")
zeta2 = sp.Function("zeta2")
zetav = sp.Function("zetav")
zetareg = sp.Function("zetareg")
zetasym = sp.Function("zetasym")

def P2Hom(X, k):
    r = len(X)
    total = 0
    for a in compositions(k, r):
        prod = reduce(mul, (pow_func(X[j], a[j]) for j in range(r)), 1)
        total += zeta2(*[ai+1 for ai in a]) * prod
    return sp.expand(total)

def ZHom(X, k):
    r = len(X)
    total = 0
    for a in compositions(k, r):
        prod = reduce(mul, (pow_func(X[j], a[j]) for j in range(r)), 1)
        total += zetareg(*[ai+1 for ai in a]) * prod
    return sp.expand(total)

def ZsymHom(X, k):
    r = len(X)
    total = 0
    for a in compositions(k, r):
        prod = reduce(mul, (pow_func(X[j], a[j]) for j in range(r)), 1)
        total += zetasym(*[ai+1 for ai in a]) * prod
    return sp.expand(total)

def ZVHom(X, k):
    r = len(X)
    total = 0
    for a in compositions(k, r):
        prod = reduce(mul, (pow_func(X[j], a[j]) for j in range(r)), 1)
        total += (-1)**sum(ai+1 for ai in a) * zetav(*[ai+1 for ai in a]) * prod
    return sp.expand(X[0]*X[-1]*total)

def ZZHom(X, Y, k):
    total = sum(ZHom(X, w) * ZHom(Y, k-w) for w in range(k+1))
    return sp.expand(total)

# -----------------------
# Relation 系
# -----------------------

def Relation1(X,k):
    X = list(X) if not isinstance(X, list) else X
    r = len(X)
    total = P2Hom(X, k)  # Mathematica の P2@@X
    for i in range(1, r-1):
        left = [X[i]-X[j] for j in range(i)]
        right = [X[j]-X[i] for j in range(i+1,r)]
        total -= (-1)**i * (X[i] - X[-1]) * ZZHom(list(reversed(left)),right,k-1)
    return sp.expand(total)

def Relation0(X,k):
    X = list(X) if not isinstance(X, list) else X
    r = len(X)
    total = 0  # Mathematica の P2@@X
    for i in range(1, r-1):
        left = [X[i]-X[j] for j in range(i)]
        right = [X[j]-X[i] for j in range(i+1,r)]
        total += (-1)**i * (X[i] - X[-1]) * ZZHom(list(reversed(left)),right,k-1)
    return sp.expand(total)

def Relation2(X, k):
    X = list(X) if not isinstance(X, list) else X
    r = len(X)
    Xs = [X[i] - X[-1] for i in range(r-1)]  # Take[X, r-1] - X[[r]]

    P1 = 0
    for i in range(1, r-1):  # i=2..r-1 → Pythonでは 1..r-2
        left = [X[i] - X[j] for j in range(i)]
        right = [X[j] - X[i] for j in range(i+1, r)]
        P1 += (-1)**i * ZZHom(list(reversed(left)), right, k-1)

    ZS = 0
    for i in range(1, r-1):  # i=1..r-2
        left = Xs[:i]
        right = [-x for x in reversed(Xs[i:])]
        ZS += (-1)**(r-1-i) * ZZHom(left, right, k-1)
    ZS -= ZsymHom(Xs, k-1)

    return sp.expand(P1 - ZS)

def Relation3(X,k):
    X = list(X)
    X1 = X[0]

    def replace_first(XL):
        return [0] + XL[1:]
    def replace_last(XL):
        return XL[:-1] + [0]
    def replace_both(XL):
        return [0] + XL[1:-1] + [0]
    def Rem1(XL):
        return (
            -ZVHom(XL, k-2)
            + Relation0(XL, k)
            - Relation0(replace_first(XL), k)
            - Relation0(replace_last(XL), k)
            + Relation0(replace_both(XL), k)
        )

    term1 = Rem1(X)
    X_replace = replace_last(X)
    term2 = X1 * Relation2(X_replace, k)
    X_replace2 = replace_first(X)
    term3 = Rem1([x - X1 for x in X_replace2])

    return sp.simplify((term1 + term2 + term3)/X1)

# -----------------------
# Dual 系
# -----------------------

def shiftEnds(k):
    k = list(k) if not isinstance(k, list) else k
    
    if len(k) == 1:
        return [k[0] - 2]
    else:
        res = k.copy()
        res[0] -= 1      # 1 -> k[[1]] - 1
        res[-1] -= 1     # -1 -> k[[-1]] - 1
        return res
    
def DualIndex(k):
    k = list(k) if not isinstance(k, list) else k
    n = sum(k)
    
    acc = []
    s = 0
    for x in k:
        s += x
        acc.append(s)
    cuts = acc[:-1]
    
    pos = [i for i in range(1, n) if i not in cuts]
    seq = [0] + pos + [n]
    result = [seq[i+1] - seq[i] for i in range(len(seq)-1)]
    return result

# -----------------------
# Fの計算 系
# -----------------------

def rotate_right(lst, i):
    i = i % len(lst)
    return lst[-i:] + lst[:-i]

def rotate_left(lst, i):
    i = i % len(lst)
    return lst[i:] + lst[:i]

def ZEqualList(X, k):
    X = list(X) if not isinstance(X, list) else X
    r = len(X)
    result = []

    for i in range(0, r-1):
        # Join[{X[[1]]}, RotateRight[Rest[X], i]]
        term1_list = [X[0]] + rotate_right(X[1:], i)
        term1 = Relation1(term1_list, k)

        # (X[[1]] - X[[-1 - i]]) * Sum[...]
        factor = X[0] - X[-1 - i]

        s = 0
        for j in range(1, i+1):
            tmp = rotate_left(X[1:], j-1-i)
            tmp = [x - X[0] for x in tmp] + [0]
            s += Relation3(tmp, k)

        expr = sp.together(term1 - factor * s)
        expr = sp.cancel(expr)     # ← これを追加
        result.append(sp.expand(expr))

    return result

def FList(X, k):
    X = list(X) if not isinstance(X, list) else X
    r = len(X)

    Zlist = ZEqualList(X, k)
    result = []

    for i in range(r-1):  # ← 修正ポイント
        expr = sp.expand(Zlist[i])
        deriv = sp.diff(expr, X[0], X[-(i+1)])
        result.append(deriv)

    result = [expr.subs(X[0], 0) for expr in result]

    return result

def Last1Equ(X, k):
    X = list(X) if not isinstance(X, list) else X
    F = FList(X, k)
    r = len(X)
    term1 = F[0]
    totalF = sum(F, sp.Integer(0))

    term2 = sp.Rational(1, k - 2 + r) * sp.diff(
        X[-1] * totalF, X[-1]
    )

    expr = term1 - term2
    return sp.expand(expr)

def replace_zeta2(expr):
    if expr.func == zeta2:
        XL = expr.args
        if all(x.is_Integer for x in XL):
            return (-1)**sum(XL) * ZS(*DualIndex(shiftEnds(list(XL))))
        return expr
    elif expr.args:
        return expr.func(*[replace_zeta2(a) for a in expr.args])
    return expr
    
def replace_zetav(expr):
    if expr.func == zetav:
        XL = expr.args
        if all(x.is_Integer for x in XL):
            return ZS(*DualIndex(list(XL)))
        return expr
    elif expr.args:
        return expr.func(*[replace_zetav(a) for a in expr.args])
    return expr

def Last2Equ(X, k):
    expr = Last1Equ(X, k)
    expr = sp.together(expr)

    expr = replace_zeta2(expr)
    expr = replace_zetav(expr)

    expr = expr.replace(lambda e: e.func == zetareg, lambda e: Z(*e.args))
    expr = expr.replace(lambda e: e.func == zetasym, lambda e: ZS(*e.args))

    return expr

def Zetaeq(*ind):
    ind = [int(x) for x in ind]

    r = int(len(ind))
    k = int(sum(ind))

    Xlist = [sp.Symbol(f"X{i}") for i in range(1, r+2)]

    if all(x == 1 for x in ind[:-1]) and ind[-1] == 2:
        return sp.expand(Last2Equ(Xlist, 2))
    
    expr = Last2Equ(Xlist, int(k - r + 1))

    # 係数抽出
    monomial = 1
    for i in range(2, r+2):
        power = ind[i-2] - 1 - (1 if i == r+1 else 0)
        monomial *= Xlist[i-1]**power

    coeff = sp.expand(expr).coeff(monomial)
    coeffReg = RegShuffle(coeff)

    return sp.expand(coeffReg / (ind[-1] - 1))


def mzv(*ind):
    expr = Zetaeq(*ind)
    s = sp.latex(expr)

    s = s.replace("ZS", r"\zeta_S")
    s = s.replace("Z", r"\zeta")

    return html(f"$$ {s} $$")
